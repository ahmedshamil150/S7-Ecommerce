<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login - S7 Sports</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: { extend: {
    colors: { primary: "#0F5E3A", "primary-dark": "#0A4027", gold: "#D4AF37", cream: "#F8F6F0" },
    fontFamily: { body: ["Inter", "sans-serif"], heading: ["Outfit", "sans-serif"] },
  } }
};
</script>
</head>
<body class="bg-cream font-body">
<div class="min-h-screen flex items-center justify-center px-4">
<div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md">
<div class="text-center mb-8">
<h1 class="font-heading text-2xl font-extrabold text-primary">S7<span class="text-gold">SPORTS</span></h1>
<p class="text-sm text-gray-500 mt-1">Admin Panel</p>
</div>
<form id="login-form" class="space-y-5">
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
<input type="text" id="username" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none text-sm" required />
</div>
<div>
<label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
<input type="password" id="password" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none text-sm" required />
</div>
<p id="login-error" class="text-red-500 text-sm hidden"></p>
<button type="submit" class="w-full bg-primary text-white py-2.5 rounded-lg font-semibold hover:bg-primary-dark transition-colors text-sm">Sign In</button>
</form>
</div>
</div>
<script>
document.getElementById('login-form').addEventListener('submit', (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('login-error');

  const users = {
    admin: 'S7Sports@Admin1',
    manager: 'S7Sports@Manager2',
    staff: 'S7Sports@Staff3',
  };

  if (users[username] && users[username] === password) {
    sessionStorage.setItem('s7_admin', username);
    window.location.href = './dashboard';
  } else {
    errorEl.textContent = 'Invalid username or password';
    errorEl.classList.remove('hidden');
  }
});
</script>
</body>
</html>
