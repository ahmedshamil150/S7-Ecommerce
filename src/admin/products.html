<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Products - S7 Sports Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/admin.css"/>
</head>
<body class="admin-body">
<button id="admin-burger" class="admin-burger" aria-label="Menu">☰</button>
<div id="admin-overlay" class="admin-overlay"></div>
<aside id="admin-sidebar" class="admin-sidebar">
  <h2>S7 <span>SPORTS</span></h2>
  <nav>
    <ul>
      <li><a href="./dashboard"><span class="material-symbols-outlined nav-icon">dashboard</span>Dashboard</a></li>
      <li><a href="./products" class="active"><span class="material-symbols-outlined nav-icon">sports_cricket</span>Products</a></li>
      <li><a href="./orders"><span class="material-symbols-outlined nav-icon">inventory_2</span>Orders</a></li>
      <li><a href="./invoices"><span class="material-symbols-outlined nav-icon">receipt</span>Invoices</a></li>
      <li><a href="./revenue"><span class="material-symbols-outlined nav-icon">payments</span>Revenue</a></li>
      <li><a href="./reviews"><span class="material-symbols-outlined nav-icon">star</span>Reviews</a></li>
      <li><a href="./coupons"><span class="material-symbols-outlined nav-icon">confirmation_number</span>Coupons</a></li>
      <li><a href="./categories"><span class="material-symbols-outlined nav-icon">category</span>Categories</a></li>
      <li><a href="./hero"><span class="material-symbols-outlined nav-icon">photo_library</span>Hero</a></li>
      <li><a href="./charges"><span class="material-symbols-outlined nav-icon">bolt</span>Charges</a></li>
      <li><a href="./analytics"><span class="material-symbols-outlined nav-icon">analytics</span>Analytics</a></li>
    </ul>
  </nav>
  <div class="nav-bottom">
    <a href="./login" id="logout-btn"><span class="material-symbols-outlined nav-icon">logout</span>Logout</a>
  </div>
</aside>
<main class="admin-main">
  <div class="admin-page-header">
    <h2>Products</h2>
    <button class="button" id="add-product-btn">+ Add Product</button>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1rem;">
    <select id="filter-category" style="padding:0.35rem 0.6rem;border:1.5px solid #2a2a2a;border-radius:8px;background:#121212;color:#e8e8e8;font-size:0.8rem;font-family:Inter,sans-serif;">
      <option value="">All Categories</option>
    </select>
    <select id="filter-stock" style="padding:0.35rem 0.6rem;border:1.5px solid #2a2a2a;border-radius:8px;background:#121212;color:#e8e8e8;font-size:0.8rem;font-family:Inter,sans-serif;">
      <option value="">All Stock</option>
      <option value="in-stock">In Stock</option>
      <option value="out-of-stock">Out of Stock</option>
    </select>
    <button id="filter-discount" class="product-filter-btn" data-active="false">On Sale</button>
    <button id="filter-variants" class="product-filter-btn" data-active="false">Has Variants</button>
  </div>
  <div id="products-table"><div class="admin-spinner">Loading…</div></div>
</main>
<script type="module" src="../js/admin.js"></script>
</body>
</html>
