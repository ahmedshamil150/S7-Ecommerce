<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Charges - S7 Sports Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/admin.css"/>
</head>
<body class="admin-body">
<button id="admin-burger" class="admin-burger" aria-label="Menu">☰</button>
<div id="admin-overlay" class="admin-overlay"></div>
<aside id="admin-sidebar" class="admin-sidebar">
  <h2>S7 <span>SPORTS</span></h2>
  <nav>
    <ul>
      <li><a href="./dashboard"><span class="material-symbols-outlined nav-icon">dashboard</span>Dashboard</a></li>
      <li><a href="./products"><span class="material-symbols-outlined nav-icon">sports_cricket</span>Products</a></li>
      <li><a href="./orders"><span class="material-symbols-outlined nav-icon">inventory_2</span>Orders</a></li>
      <li><a href="./invoices"><span class="material-symbols-outlined nav-icon">receipt</span>Invoices</a></li>
      <li><a href="./revenue"><span class="material-symbols-outlined nav-icon">payments</span>Revenue</a></li>
      <li><a href="./reviews"><span class="material-symbols-outlined nav-icon">star</span>Reviews</a></li>
      <li><a href="./coupons"><span class="material-symbols-outlined nav-icon">confirmation_number</span>Coupons</a></li>
      <li><a href="./categories"><span class="material-symbols-outlined nav-icon">category</span>Categories</a></li>
      <li><a href="./hero"><span class="material-symbols-outlined nav-icon">photo_library</span>Hero</a></li>
      <li><a href="./charges" class="active"><span class="material-symbols-outlined nav-icon">bolt</span>Charges</a></li>
      <li><a href="./analytics"><span class="material-symbols-outlined nav-icon">analytics</span>Analytics</a></li>
    </ul>
  </nav>
  <div class="nav-bottom">
    <a href="./login" id="logout-btn"><span class="material-symbols-outlined nav-icon">logout</span>Logout</a>
  </div>
</aside>
<main class="admin-main">
  <div class="admin-page-header">
    <h2>Charges</h2>
  </div>
  <form id="charge-form" style="display:flex;flex-wrap:wrap;gap:0.75rem;margin-bottom:1.5rem;background:#121212;padding:1.25rem;border-radius:12px;border:1px solid #2a2a2a;">
    <input id="c-key" type="text" placeholder="Key (e.g. tax_rate)" required style="flex:1;min-width:100px;padding:0.5rem 0.75rem;border:1.5px solid #2a2a2a;border-radius:8px;background:#1a1a1a;color:#e8e8e8;font-size:0.85rem;font-family:Inter,sans-serif;" />
    <input id="c-label" type="text" placeholder="Label (e.g. Tax)" required style="flex:1;min-width:100px;padding:0.5rem 0.75rem;border:1.5px solid #2a2a2a;border-radius:8px;background:#1a1a1a;color:#e8e8e8;font-size:0.85rem;font-family:Inter,sans-serif;" />
    <input id="c-value" type="number" placeholder="Value" step="0.01" required style="width:100px;padding:0.5rem 0.75rem;border:1.5px solid #2a2a2a;border-radius:8px;background:#1a1a1a;color:#e8e8e8;font-size:0.85rem;font-family:Inter,sans-serif;" />
    <select id="c-type" style="width:110px;padding:0.5rem 0.75rem;border:1.5px solid #2a2a2a;border-radius:8px;background:#1a1a1a;color:#e8e8e8;font-size:0.85rem;font-family:Inter,sans-serif;">
      <option value="fixed">Fixed</option>
      <option value="percentage">Percentage</option>
    </select>
    <button type="submit" class="button" id="save-charge-btn">Save</button>
    <button type="button" id="cancel-charge-btn" style="display:none;padding:0.55rem 1.1rem;border:none;border-radius:8px;background:#555;color:#fff;font-family:Inter,sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;">Cancel</button>
    <p id="charge-form-msg" style="display:none;color:#ef5350;font-size:0.85rem;width:100%;margin-top:0.25rem;"></p>
  </form>
  <div id="charges-table"><div class="admin-spinner">Loading…</div></div>
</main>
<script type="module" src="../js/admin.js"></script>
</body>
</html>
